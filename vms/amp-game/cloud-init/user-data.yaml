#cloud-config
#
# AMP game-server VM — first-boot configuration.
# Placeholders (%%VAR%%) are substituted by ../deploy.sh before upload.

hostname: "%%HOSTNAME%%"

users:
  - name: "%%ADMIN_USERNAME%%"
    groups: [sudo]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - "%%SSH_PUBLIC_KEY%%"

# Re-enable unattended-upgrades (base template ships with the timer masked
# so locked-down roles can stay frozen). Default config patches security
# updates only and does NOT auto-reboot, so it stays unobtrusive between
# game sessions.
write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";

runcmd:
  # SSH (22/tcp) is already open from the base template's ufw config.
  - ufw allow 8080/tcp comment "AMP web UI"
  - ufw allow 25565/tcp comment "Minecraft Java"
  - ufw allow 25565/udp comment "Minecraft Bedrock / query"
  - ufw reload
  - systemctl unmask apt-daily.timer apt-daily-upgrade.timer
  - systemctl enable --now apt-daily.timer apt-daily-upgrade.timer

# Intentionally no `final_message:` block. cloud-init's final_message
# module runs on every boot, so anything set here gets re-printed to
# the console on every reboot — useful exactly once, then noise.
# Post-deploy AMP installer steps live in vms/amp-game/README.md and
# deploy.sh's success output instead.
